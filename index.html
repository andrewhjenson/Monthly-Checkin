<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Monthly Check-In Protocol</title>
  <style>
    :root{
      --bg:#070a12;
      --panel: rgba(15, 23, 42, 0.68);
      --text:#e2e8f0;
      --muted: rgba(226,232,240,.7);
      --accent:#38bdf8;
      --accent2:#a78bfa;
      --danger:#fb7185;
      --ok:#34d399;
      --border: rgba(148,163,184,.25);

      /* Cinematic state tints */
      --tintA: rgba(56,189,248,.18);  /* blue */
      --tintB: rgba(167,139,250,.16); /* violet */
      --tintC: rgba(244,114,182,.10); /* pink */
      --stateBlueBoost: 0;
      --stateVioletBoost: 0;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,system-ui,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 15% 20%, rgba(56,189,248, calc(.18 + var(--stateBlueBoost))), transparent 60%),
        radial-gradient(900px 600px at 85% 35%, rgba(167,139,250, calc(.16 + var(--stateVioletBoost))), transparent 55%),
        radial-gradient(700px 500px at 55% 85%, rgba(244,114,182,.10), transparent 60%),
        linear-gradient(180deg, #050714, #070a12 55%, #05060c);
      overflow:hidden;
      transition: filter .35s ease;
    }

    /* animated "grid" */
    .grid {
      position:fixed; inset:-40px;
      background-image:
        linear-gradient(to right, rgba(148,163,184,.08) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(148,163,184,.08) 1px, transparent 1px);
      background-size: 70px 70px;
      transform: perspective(900px) rotateX(55deg) translateY(120px);
      filter: blur(.2px);
      opacity:.35;
      animation: drift 12s linear infinite;
      pointer-events:none;
      transition: opacity .35s ease;
    }
    @keyframes drift{
      from{background-position:0 0}
      to{background-position:0 280px}
    }

    /* scanlines */
    .scanlines{
      position:fixed; inset:0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.04),
        rgba(255,255,255,.04) 1px,
        transparent 2px,
        transparent 6px
      );
      mix-blend-mode:overlay;
      opacity:.25;
      pointer-events:none;
      animation: flicker 5s infinite;
      transition: opacity .35s ease;
    }
    @keyframes flicker{
      0%, 100% { opacity:.22 }
      50% { opacity:.28 }
    }

    /* floating dots */
    .dots{
      position:fixed; inset:0;
      pointer-events:none;
    }
    .dot{
      position:absolute;
      width:6px; height:6px; border-radius:50%;
      background: rgba(56,189,248,.9);
      box-shadow: 0 0 14px rgba(56,189,248,.55);
      opacity:.7;
      animation: floaty 10s ease-in-out infinite;
    }
    .dot.purple{
      background: rgba(167,139,250,.9);
      box-shadow: 0 0 14px rgba(167,139,250,.55);
    }
    @keyframes floaty{
      0%,100% { transform: translate(0,0) }
      50% { transform: translate(20px,-30px) }
    }

    .wrap{
      width:min(520px, 92vw);
      position:relative;
      z-index:2;
    }

    .panel{
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px 18px 18px;
      backdrop-filter: blur(14px);
      box-shadow:
        0 10px 30px rgba(0,0,0,.40),
        0 0 0 1px rgba(56,189,248,.07) inset;
      overflow:hidden;
      position:relative;
      transform: translateZ(0);
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:10px;
      font-size:12px;
      letter-spacing:.22em;
      text-transform:uppercase;
      color: rgba(226,232,240,.85);
      padding: 8px 10px;
      border: 1px solid rgba(148,163,184,.22);
      border-radius: 999px;
      background: rgba(2,6,23,.45);
    }
    .pulse{
      width:10px; height:10px; border-radius:50%;
      background: var(--ok);
      box-shadow: 0 0 0 0 rgba(52,211,153,.5);
      animation: pulse 1.6s infinite;
    }
    @keyframes pulse{
      0% { box-shadow: 0 0 0 0 rgba(52,211,153,.5) }
      70% { box-shadow: 0 0 0 10px rgba(52,211,153,0) }
      100% { box-shadow: 0 0 0 0 rgba(52,211,153,0) }
    }

    h1{
      margin:14px 0 4px;
      font-size:26px;
      letter-spacing:.02em;
    }
    .sub{
      margin:0 0 16px;
      color: var(--muted);
      font-size:14px;
      line-height:1.4;
    }

    .hr{
      height:1px;
      background: linear-gradient(90deg, transparent, rgba(56,189,248,.35), transparent);
      margin: 14px 0 14px;
      opacity:.9;
    }

    .btnRow{display:grid; gap:10px; margin-top:6px;}
    button{
      width:100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(148,163,184,.22);
      background: rgba(2,6,23,.30);
      color: var(--text);
      font-size:14px;
      cursor:pointer;
      transition: transform .12s ease, background .12s ease, border-color .12s ease, filter .12s ease;
      position:relative;
      overflow:hidden;
    }
    button:hover{
      transform: translateY(-1px);
      border-color: rgba(56,189,248,.45);
      background: rgba(2,6,23,.42);
    }
    button:disabled{
      cursor: not-allowed;
      opacity: .7;
      filter: saturate(.7);
    }
    .primary{
      border-color: rgba(56,189,248,.45);
      background: linear-gradient(135deg, rgba(56,189,248,.18), rgba(167,139,250,.10));
    }
    .secondary{
      border-color: rgba(148,163,184,.22);
    }

    /* dodging nope button */
    .nopeWrap{
      margin-top: 8px;
      position:relative;
      height: 48px;
    }
    .nope{
      position:absolute;
      left: 0;
      top: 0;
      width: 160px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(251,113,133,.35);
      background: rgba(251,113,133,.10);
      color: rgba(255,255,255,.92);
    }
    .nope:hover{
      border-color: rgba(251,113,133,.6);
      background: rgba(251,113,133,.14);
    }
    /* when it starts running */
    .nope.roam{
      position: fixed;
      z-index: 9999;
      transition: left .12s ease, top .12s ease;
    }

    .hidden{display:none !important;}

    /* reschedule */
    .reschedule{
      margin-top: 12px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(148,163,184,.18);
      background: rgba(2,6,23,.22);
    }
    .labelRow{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom: 10px;
      color: rgba(226,232,240,.85);
      font-size:13px;
    }
    .chip{
      font-variant-numeric: tabular-nums;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(56,189,248,.25);
      background: rgba(56,189,248,.10);
      color: rgba(226,232,240,.92);
      min-width: 82px;
      text-align:center;
    }
    input[type="range"]{
      width:100%;
      accent-color: var(--accent);
    }
    .tiny{
      margin-top:8px;
      color: rgba(226,232,240,.55);
      font-size:12px;
    }

    /* terminal output */
    .terminal{
      margin-top: 14px;
      border-radius: 14px;
      border: 1px solid rgba(148,163,184,.16);
      background: rgba(2,6,23,.55);
      padding: 12px 12px 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      line-height: 1.5;
      color: rgba(226,232,240,.92);
      max-height: 200px;
      overflow:auto;
      box-shadow: 0 0 0 1px rgba(56,189,248,.06) inset;
    }
    .line { opacity:.95 }
    .ok { color: rgba(52,211,153,.95) }
    .warn { color: rgba(251,191,36,.95) }
    .err { color: rgba(251,113,133,.95) }

    /* confetti */
    .confetti{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index: 9;
      overflow:hidden;
    }
    .piece{
      position:absolute;
      width:10px; height:14px;
      opacity:.9;
      transform: rotate(0deg);
      animation: fall 1.35s linear forwards;
    }
    @keyframes fall{
      to{
        transform: translateY(110vh) rotate(420deg);
        opacity: 0.9;
      }
    }

    /* stamp */
    .stamp{
      position:absolute;
      right:-40px;
      top:18px;
      transform: rotate(18deg);
      border: 2px solid rgba(56,189,248,.35);
      color: rgba(56,189,248,.7);
      padding: 10px 22px;
      border-radius: 12px;
      font-weight: 700;
      letter-spacing:.18em;
      text-transform: uppercase;
      background: rgba(2,6,23,.25);
      box-shadow: 0 0 0 1px rgba(56,189,248,.10) inset;
      user-select:none;
      transition: border-color .35s ease, color .35s ease, box-shadow .35s ease, filter .35s ease;
    }
    .stamp.active{
      border-color: rgba(56,189,248,.55);
      color: rgba(56,189,248,.95);
      box-shadow: 0 0 0 1px rgba(56,189,248,.18) inset, 0 0 20px rgba(56,189,248,.18);
    }
    .stamp.standby{
      border-color: rgba(167,139,250,.55);
      color: rgba(167,139,250,.92);
      box-shadow: 0 0 0 1px rgba(167,139,250,.18) inset, 0 0 20px rgba(167,139,250,.18);
    }

    /* footer hint */
    .foot{
      margin-top: 10px;
      text-align:center;
      color: rgba(226,232,240,.45);
      font-size: 12px;
    }

    /* ===== Cinematic overlays ===== */
    .overlay{
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(0,0,0,.62);
      backdrop-filter: blur(6px);
      z-index: 9998;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
    }
    .overlay.show{
      opacity: 1;
      pointer-events: auto;
    }
    .countWrap{
      text-align:center;
      padding: 18px 22px;
      border-radius: 18px;
      border: 1px solid rgba(148,163,184,.22);
      background: rgba(2,6,23,.55);
      box-shadow: 0 10px 30px rgba(0,0,0,.45), 0 0 0 1px rgba(56,189,248,.06) inset;
      min-width: min(440px, 92vw);
    }
    .countTitle{
      letter-spacing: .22em;
      text-transform: uppercase;
      font-size: 12px;
      color: rgba(226,232,240,.78);
      margin-bottom: 10px;
    }
    .countNum{
      font-size: 64px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin: 0;
      line-height: 1;
      text-shadow: 0 0 24px rgba(56,189,248,.22);
    }
    .countSub{
      margin-top: 12px;
      font-size: 13px;
      color: rgba(226,232,240,.65);
    }

    /* scan streak */
    .streak{
      position: fixed;
      left: -20vw;
      top: 18vh;
      width: 140vw;
      height: 3px;
      background: linear-gradient(90deg, transparent, rgba(56,189,248,.0), rgba(56,189,248,.85), rgba(56,189,248,.0), transparent);
      filter: blur(.3px);
      z-index: 9997;
      opacity: 0;
      transform: rotate(-6deg);
      pointer-events:none;
    }
    .streak.fire{
      animation: streak 720ms ease-out forwards;
    }
    @keyframes streak{
      0%{ opacity: 0; transform: translateX(-20vw) rotate(-6deg); }
      15%{ opacity: 1; }
      100%{ opacity: 0; transform: translateX(60vw) rotate(-6deg); }
    }

    /* pulse flash */
    .flash{
      position: fixed;
      inset: 0;
      background: radial-gradient(900px 600px at 50% 40%, rgba(56,189,248,.20), transparent 65%);
      z-index: 9996;
      opacity: 0;
      pointer-events:none;
    }
    .flash.pulse{
      animation: flash 420ms ease-out forwards;
    }
    @keyframes flash{
      0%{ opacity: 0; }
      35%{ opacity: 1; }
      100%{ opacity: 0; }
    }

    /* shake */
    .shake{
      animation: shake .32s ease-in-out 1;
    }
    @keyframes shake{
      0%{ transform: translate(0,0); }
      20%{ transform: translate(-1px, 1px); }
      40%{ transform: translate(1px, -1px); }
      60%{ transform: translate(-1px, -1px); }
      80%{ transform: translate(1px, 1px); }
      100%{ transform: translate(0,0); }
    }

    /* action glow on button press */
    .btnGlow{
      position: absolute;
      inset: -120px;
      background: radial-gradient(260px 180px at var(--gx, 50%) var(--gy, 50%), rgba(56,189,248,.22), transparent 60%);
      opacity: 0;
      pointer-events:none;
      transition: opacity .18s ease;
    }
    button:active .btnGlow{ opacity: 1; }

    /* state adjustments */
    body.state-active .grid{ opacity: .42; }
    body.state-active .scanlines{ opacity: .30; }
    body.state-active { filter: saturate(1.08) contrast(1.03); }

    body.state-standby .grid{ opacity: .38; }
    body.state-standby .scanlines{ opacity: .28; }
    body.state-standby { filter: saturate(1.06) contrast(1.02); }

  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="scanlines"></div>

  <div class="dots" id="dots"></div>

  <div class="wrap">
    <div class="panel" id="panel">
      <div class="stamp" id="stamp">Protocol</div>

      <div class="badge">
        <span class="pulse"></span>
        <span>CHECK-IN SYSTEM ONLINE</span>
      </div>

      <h1>Monthly Check-In</h1>
      <p class="sub">One month has passed. As promised, checking in.</p>

      <div class="hr"></div>

      <div class="btnRow">
        <button class="primary" id="btnProceed">
          <span class="btnGlow"></span>
          Call me tonight
        </button>
        <button class="secondary" id="btnResched">
          <span class="btnGlow"></span>
          I still need more time
        </button>
      </div>

      <div class="nopeWrap" aria-label="Nope button area">
        <button class="nope" id="btnNope">Nope</button>
      </div>

      <div class="reschedule hidden" id="reschedBox">
        <div class="labelRow">
          <div>Select new check-in window (max 45 days)</div>
          <div class="chip" id="chipDays">30 days</div>
        </div>
        <input type="range" id="rangeDays" min="1" max="45" value="30" />
        <div class="tiny">System cap: 45 days.</div>
        <div class="btnRow" style="margin-top:12px;">
          <button class="primary" id="btnConfirm">
            <span class="btnGlow"></span>
            Confirm
          </button>
        </div>
      </div>

      <div class="terminal hidden" id="terminal"></div>

      <div class="foot">This system is mildly unnecessary.</div>
    </div>
  </div>

  <div class="confetti" id="confetti"></div>

  <!-- Cinematic layers -->
  <div class="flash" id="flash"></div>
  <div class="streak" id="streak"></div>
  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="countWrap">
      <div class="countTitle" id="countTitle">CONNECTION PROTOCOL</div>
      <div class="countNum" id="countNum">3</div>
      <div class="countSub" id="countSub">Authenticating…</div>
    </div>
  </div>

<script>
  /***********************
   * NTFY CONFIG
   ***********************/
  const NTFY_TOPIC = "c47fa29e91b-alx";
  const NTFY_URL = `https://ntfy.sh/${NTFY_TOPIC}`;

  async function notifyMe(message) {
    try {
      await fetch(NTFY_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain",
          "Title": "Monthly Check-In",
          "Priority": "4"
        },
        body: message
      });
    } catch (err) {
      console.error("Notification failed:", err);
    }
  }

  /***********************
   * Floating dots
   ***********************/
  (function initDots(){
    const dotsEl = document.getElementById('dots');
    const make = (x,y,cls)=> {
      const d = document.createElement('div');
      d.className = 'dot ' + (cls||'');
      d.style.left = x + '%';
      d.style.top = y + '%';
      d.style.animationDelay = (Math.random()*2) + 's';
      d.style.animationDuration = (8 + Math.random()*6) + 's';
      dotsEl.appendChild(d);
    };
    make(12,18,'');
    make(26,70,'purple');
    make(78,24,'');
    make(84,78,'purple');
    make(55,40,'');
  })();

  /***********************
   * Elements
   ***********************/
  const btnProceed = document.getElementById('btnProceed');
  const btnResched = document.getElementById('btnResched');
  const btnNope = document.getElementById('btnNope');
  const reschedBox = document.getElementById('reschedBox');
  const rangeDays = document.getElementById('rangeDays');
  const chipDays = document.getElementById('chipDays');
  const btnConfirm = document.getElementById('btnConfirm');
  const terminal = document.getElementById('terminal');
  const confetti = document.getElementById('confetti');

  const panel = document.getElementById('panel');
  const stamp = document.getElementById('stamp');
  const overlay = document.getElementById('overlay');
  const countTitle = document.getElementById('countTitle');
  const countNum = document.getElementById('countNum');
  const countSub = document.getElementById('countSub');
  const streak = document.getElementById('streak');
  const flash = document.getElementById('flash');

  /***********************
   * Terminal helpers
   ***********************/
  function showTerminal() {
    terminal.classList.remove('hidden');
    terminal.innerHTML = '';
  }
  function addLine(text, cls){
    const div = document.createElement('div');
    div.className = 'line' + (cls ? ' ' + cls : '');
    div.textContent = text;
    terminal.appendChild(div);
    terminal.scrollTop = terminal.scrollHeight;
  }

  /***********************
   * Confetti
   ***********************/
  function popConfetti(){
    confetti.innerHTML = '';
    const colors = ['rgba(56,189,248,.95)','rgba(167,139,250,.95)','rgba(52,211,153,.95)','rgba(251,113,133,.95)','rgba(251,191,36,.95)'];
    for(let i=0;i<60;i++){
      const p = document.createElement('div');
      p.className = 'piece';
      p.style.left = (Math.random()*100) + 'vw';
      p.style.top = (-10 - Math.random()*30) + 'vh';
      p.style.background = colors[Math.floor(Math.random()*colors.length)];
      p.style.animationDelay = (Math.random()*0.15) + 's';
      p.style.transform = `rotate(${Math.random()*180}deg)`;
      p.style.borderRadius = (Math.random()>.5 ? '2px' : '999px');
      confetti.appendChild(p);
    }
    setTimeout(()=> confetti.innerHTML = '', 1700);
  }

  /***********************
   * Cinematic FX helpers
   ***********************/
  function pulseFlash(){
    flash.classList.remove('pulse');
    void flash.offsetWidth;
    flash.classList.add('pulse');
  }
  function fireStreak(){
    streak.classList.remove('fire');
    void streak.offsetWidth;
    streak.classList.add('fire');
  }
  function shakePanel(){
    panel.classList.remove('shake');
    void panel.offsetWidth;
    panel.classList.add('shake');
  }

  function setState(mode){
    // mode: "idle" | "active" | "standby"
    document.body.classList.remove('state-active','state-standby');
    stamp.classList.remove('active','standby');

    if (mode === 'active'){
      document.body.classList.add('state-active');
      stamp.classList.add('active');
      stamp.textContent = 'ACTIVE';
      // boost blue tint, reduce violet
      document.documentElement.style.setProperty('--stateBlueBoost', '0.10');
      document.documentElement.style.setProperty('--stateVioletBoost', '0.00');
    } else if (mode === 'standby'){
      document.body.classList.add('state-standby');
      stamp.classList.add('standby');
      stamp.textContent = 'STANDBY';
      // boost violet tint
      document.documentElement.style.setProperty('--stateBlueBoost', '0.03');
      document.documentElement.style.setProperty('--stateVioletBoost', '0.10');
    } else {
      stamp.textContent = 'Protocol';
      document.documentElement.style.setProperty('--stateBlueBoost', '0');
      document.documentElement.style.setProperty('--stateVioletBoost', '0');
    }
  }

  function showOverlay(title, num, sub){
    countTitle.textContent = title;
    countNum.textContent = String(num);
    countSub.textContent = sub;
    overlay.classList.add('show');
    overlay.setAttribute('aria-hidden','false');
  }
  function hideOverlay(){
    overlay.classList.remove('show');
    overlay.setAttribute('aria-hidden','true');
  }

  /***********************
   * Optional sound (WebAudio) — only after user gesture
   ***********************/
  let audioCtx = null;
  function ensureAudio(){
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }
  function beep(freq=440, dur=0.08, gain=0.04){
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.value = freq;
    g.gain.value = gain;
    o.connect(g);
    g.connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + dur);
  }
  function thump(){
    // quick low beep
    beep(110, 0.10, 0.05);
  }
  function clicky(){
    beep(880, 0.03, 0.02);
  }

  /***********************
   * Nope button — default visible, then roam on interaction
   ***********************/
  let roaming = false;
  function dodgeWholeScreen(){
    const padding = 14;

    // first dodge: convert to fixed at current location
    if (!roaming) {
      const r = btnNope.getBoundingClientRect();
      btnNope.classList.add('roam');
      btnNope.style.left = r.left + 'px';
      btnNope.style.top  = r.top + 'px';
      roaming = true;
    }

    const btn = btnNope.getBoundingClientRect();
    const maxX = Math.max(padding, window.innerWidth  - btn.width  - padding);
    const maxY = Math.max(padding, window.innerHeight - btn.height - padding);

    const x = Math.floor(Math.random() * (maxX - padding + 1)) + padding;
    const y = Math.floor(Math.random() * (maxY - padding + 1)) + padding;

    btnNope.style.left = x + 'px';
    btnNope.style.top  = y + 'px';
  }

  btnNope.addEventListener('mouseenter', dodgeWholeScreen);
  btnNope.addEventListener('mousemove', dodgeWholeScreen);
  btnNope.addEventListener('click', (e)=>{ e.preventDefault(); dodgeWholeScreen(); });
  btnNope.addEventListener('touchstart', (e)=>{ e.preventDefault(); dodgeWholeScreen(); }, { passive:false });
  window.addEventListener('resize', () => { if (roaming) dodgeWholeScreen(); });

  /***********************
   * Reschedule UI
   ***********************/
  rangeDays.addEventListener('input', () => {
    chipDays.textContent = `${rangeDays.value} day${rangeDays.value === '1' ? '' : 's'}`;
    // tiny tactile click if sound is enabled
    clicky();
  });

  btnResched.addEventListener('click', () => {
    ensureAudio(); // user gesture -> unlock audio if allowed
    reschedBox.classList.toggle('hidden');
    showTerminal();
    addLine('> RESCHEDULE MODULE: LOADED', 'ok');
    addLine('> Awaiting input…', 'warn');
    pulseFlash();
    shakePanel();
  });

  function formatLocalDateTime(d){
    // "Apr 2 — 8:17 PM"
    const mo = d.toLocaleString(undefined, { month: 'short' });
    const day = d.getDate();
    const time = d.toLocaleString(undefined, { hour: 'numeric', minute: '2-digit' });
    return `${mo} ${day} — ${time}`;
  }

  btnConfirm.addEventListener('click', async () => {
  ensureAudio();

  const days = parseInt(rangeDays.value, 10);

  // Compute the actual check-in date/time
  const when = new Date();
  when.setDate(when.getDate() + days);

  const fullDateTime = when.toLocaleString(undefined, {
    weekday: "long",
    month: "long",
    day: "numeric",
    year: "numeric",
    hour: "numeric",
    minute: "2-digit"
  });

  const ok = window.confirm(
    `Confirm reschedule?\n\nNext check-in: ${fullDateTime}\n\n(Selected: ${days} day${days === 1 ? "" : "s"})`
  );

  if (!ok) return;

  // notify with slider value (only after she confirms)
  notifyMe(`She pressed: "I still need more time" — slider set to ${days} day(s)`);

  // cinematic standby shift
  setState('standby');
  pulseFlash();
  shakePanel();
  thump();

  showTerminal();
  addLine('> Delay request received.', 'warn');
  ...

    // cinematic standby shift
    setState('standby');
    pulseFlash();
    shakePanel();
    thump();

    showTerminal();
    addLine('> Delay request received.', 'warn');
    await sleep(360);
    addLine('> Validating parameter…', '');
    await sleep(380);

    if (days === 45){
      addLine('> Maximum allowed deferral selected.', 'warn');
      await sleep(380);
      addLine('> Constraint honored.', 'ok');
      await sleep(380);
    }

    addLine(`> Requested check-in window: ${days} day(s)`, 'warn');
    await sleep(420);
    addLine('> Validating constraints…', '');
    await sleep(420);

    if (days >= 1 && days <= 45) {
      addLine('> Constraint check: PASS (≤ 45 days)', 'ok');
      await sleep(420);

     // timeline projection overlay
showOverlay('NEXT CHECK-IN SCHEDULED', '✓', formatLocalDateTime(when));
fireStreak();
pulseFlash();
await sleep(900);
hideOverlay();

      addLine('> TIMELINE CONFIRMED.', 'ok');
      popConfetti();
      await sleep(300);
      addLine('> Space granted.', 'ok');
      await sleep(280);
      addLine('> Word honored.', 'ok');
      await sleep(380);
      addLine('> System returning to standby.', '');
    } else {
      addLine('> Constraint check: FAIL', 'err');
      addLine('> Please select 1–45.', 'err');
    }
  });

  /***********************
   * Call / Proceed — cinematic countdown + handshake
   ***********************/
  btnProceed.addEventListener('click', async () => {
    ensureAudio();

    // notify
    notifyMe('She pressed: "Call me tonight"');

    // lock buttons for drama
    btnProceed.disabled = true;
    btnResched.disabled = true;

    // Active state shift
    setState('active');
    pulseFlash();
    shakePanel();
    thump();

    showTerminal();
    addLine('> INITIATING CONNECTION PROTOCOL…');
    await sleep(380);
    addLine('> Authenticating…', '');
    await sleep(420);

    // countdown overlay
    showOverlay('CONNECTION PROTOCOL', 3, 'Authenticating…');
    beep(440, 0.08, 0.05);
    pulseFlash();
    await sleep(520);

    countNum.textContent = '2';
    beep(520, 0.08, 0.05);
    pulseFlash();
    await sleep(520);

    countNum.textContent = '1';
    beep(660, 0.08, 0.05);
    pulseFlash();
    await sleep(520);

    hideOverlay();

    // handshake streak
    fireStreak();
    pulseFlash();
    await sleep(240);

    addLine('> Opening secure channel…', '');
    await sleep(540);
    addLine('> Verifying handshake…', '');
    await sleep(600);
    addLine('> Handshake verified.', 'ok');
    await sleep(320);
    addLine('> Channel authorized.', 'ok');
    await sleep(420);
    addLine('> Connection approved. Standing by.', 'ok');

    popConfetti();

    // allow resched again if you want (or keep locked)
    // btnResched.disabled = false;
  });

  function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

  // Start idle
  setState('idle');
</script>
