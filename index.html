<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>One month has passed…</title>
  <style>
    :root{
      --bg1:#0b1020;
      --bg2:#1a1030;
      --card: rgba(255,255,255,0.08);
      --card2: rgba(255,255,255,0.12);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.70);
      --border: rgba(255,255,255,0.16);
      --shadow: 0 12px 40px rgba(0,0,0,0.35);
      --radius: 18px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background:
        radial-gradient(1200px 800px at 20% 10%, #2c2a7a 0%, transparent 60%),
        radial-gradient(900px 700px at 80% 30%, #7a2a6c 0%, transparent 55%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      overflow-x:hidden;
    }

    .wrap{
      min-height:100%;
      display:grid;
      place-items:center;
      padding:28px 16px;
    }

    .card{
      width:min(760px, 94vw);
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:26px;
      backdrop-filter: blur(10px);
    }

    .title{
      font-size:34px;
      line-height:1.12;
      margin:0 0 10px;
      letter-spacing:-0.02em;
    }

    .subtitle{
      margin:0 0 18px;
      color:var(--muted);
      font-size:16px;
      line-height:1.55;
      max-width: 62ch;
    }

    .panel{
      margin-top:18px;
      padding:16px;
      border-radius:16px;
      border:1px solid var(--border);
      background:rgba(255,255,255,0.06);
    }

    .label{
      font-size:14px;
      color:var(--muted);
      margin:0 0 10px;
      line-height:1.4;
    }

    .bigline{
      font-size:18px;
      margin:0 0 12px;
      line-height:1.45;
    }

    .slider-row{
      display:grid;
      grid-template-columns: 1fr 128px;
      gap:12px;
      align-items:center;
      margin-top:10px;
    }

    input[type="range"]{
      width:100%;
      accent-color:#b8a6ff;
    }

    input[type="number"]{
      width:128px;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(255,255,255,0.08);
      color:var(--text);
      font-weight:750;
      outline:none;
    }

    .row{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:16px;
      align-items:center;
    }

    button{
      border:1px solid var(--border);
      background:var(--card2);
      color:var(--text);
      padding:12px 16px;
      border-radius:14px;
      cursor:pointer;
      font-weight:700;
      letter-spacing:0.01em;
      box-shadow:0 10px 24px rgba(0,0,0,0.25);
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
      user-select:none;
      touch-action: manipulation;
    }
    button:hover{ transform: translateY(-1px); border-color: rgba(255,255,255,0.28); }
    button:active{ transform: translateY(0px) scale(0.99); }

    .primary{ background: rgba(120,255,200,0.18); }
    .secondary{ background: rgba(180,160,255,0.18); }

    .tiny{
      font-size:12px;
      color:var(--muted);
      margin-top:14px;
      line-height:1.45;
    }

    /* Nope button roams the whole screen */
    #nopeBtn{
      position:fixed;
      left:40px;
      top:80px;
      z-index:9999;
      transition:left 120ms ease, top 120ms ease;
      background: rgba(255,120,120,0.14);
    }

    .done {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      display: none;
      line-height: 1.45;
    }
    .done strong { color: var(--text); }

    .sparkle{
      display:inline-block;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,0.45));
      animation: floaty 2.4s ease-in-out infinite;
    }
    @keyframes floaty{
      0%,100%{ transform: translateY(0); }
      50%{ transform: translateY(-3px); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1 class="title"><span class="sparkle">✨</span> One month has passed…</h1>

      <p class="subtitle">
        I kept my word and gave you space.
        <br/>
        If you’re ready, I’d like to talk tonight.
        If you still need time, tell me how long — and I’ll honor it.
      </p>

      <div class="panel">
        <p class="label">If you need more time:</p>
        <p class="bigline">
          Check back in in <strong><span id="daysLabel">30</span></strong> days.
          <span style="color: var(--muted)">(max 45)</span>
        </p>

        <div class="slider-row">
          <input id="daysSlider" type="range" min="1" max="45" value="30"/>
          <input id="daysInput" type="number" min="1" max="45" value="30"/>
        </div>
      </div>

      <div class="row">
        <button id="callBtn" class="primary">Call me tonight</button>
        <button id="moreTimeBtn" class="secondary">I still need more time</button>
      </div>

      <div id="doneBox" class="done"></div>

      <p class="tiny">
        (There’s also a “Nope” button somewhere… it’s not cooperative.)
      </p>
    </div>
  </div>

  <button id="nopeBtn">Nope</button>

  <script>
    /***********************
     * CONFIG: NTFY
     ***********************/
    const NTFY_TOPIC = "c47fa29e91b-alx";
    const NTFY_URL = `https://ntfy.sh/${NTFY_TOPIC}`;

    async function notifyMe(message) {
      try {
        await fetch(NTFY_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain",
            "Title": "Alexis Page Update",
            "Priority": "4"
          },
          body: message
        });
      } catch (err) {
        console.error("Notification failed:", err);
      }
    }

    /***********************
     * ELEMENTS
     ***********************/
    const callBtn = document.getElementById("callBtn");
    const moreTimeBtn = document.getElementById("moreTimeBtn");
    const nopeBtn = document.getElementById("nopeBtn");

    const daysSlider = document.getElementById("daysSlider");
    const daysInput = document.getElementById("daysInput");
    const daysLabel = document.getElementById("daysLabel");

    const doneBox = document.getElementById("doneBox");

    let selectedDays = Number(daysSlider.value);

    function clamp(n, min, max){
      return Math.min(max, Math.max(min, n));
    }

    function setDays(n){
      const v = clamp(Number(n || 1), 1, 45);
      selectedDays = v;
      daysSlider.value = String(v);
      daysInput.value = String(v);
      daysLabel.textContent = String(v);
    }

    function showDone(html){
      doneBox.innerHTML = html;
      doneBox.style.display = "block";
    }

    /***********************
     * NOPE MOVEMENT (whole screen)
     ***********************/
    function randomNopePosition(){
      const padding = 14;
      const btnW = nopeBtn.offsetWidth || 120;
      const btnH = nopeBtn.offsetHeight || 44;

      const vw = window.innerWidth;
      const vh = window.innerHeight;

      const maxX = Math.max(padding, vw - btnW - padding);
      const maxY = Math.max(padding, vh - btnH - padding);

      const x = Math.floor(Math.random() * (maxX - padding + 1)) + padding;
      const y = Math.floor(Math.random() * (maxY - padding + 1)) + padding;

      return { x, y };
    }

    function moveNope(){
      const {x,y} = randomNopePosition();
      nopeBtn.style.left = `${x}px`;
      nopeBtn.style.top = `${y}px`;
    }

    /***********************
     * EVENTS
     ***********************/
    // Sync slider + number input
    daysSlider.addEventListener("input", (e) => setDays(e.target.value));
    daysInput.addEventListener("input", (e) => setDays(e.target.value));

    // Buttons
    callBtn.addEventListener("click", () => {
      notifyMe('She pressed: "Call me tonight"');
      callBtn.disabled = true;
      moreTimeBtn.disabled = true;

      showDone(`<strong>Received.</strong> “Call me tonight.”`);
      callBtn.textContent = "Got it ❤️";
    });

    moreTimeBtn.addEventListener("click", () => {
      notifyMe(`She pressed: "I still need more time" — slider set to ${selectedDays} days`);
      callBtn.disabled = true;
      moreTimeBtn.disabled = true;

      showDone(`<strong>Received.</strong> “I still need more time.”<br/>Check back in: <strong>${selectedDays} days</strong>.`);
      moreTimeBtn.textContent = `Okay — ${selectedDays} days`;
    });

    // Nope runs away
    nopeBtn.addEventListener("mouseenter", moveNope);
    nopeBtn.addEventListener("mousemove", moveNope);
    nopeBtn.addEventListener("click", (e) => { e.preventDefault(); moveNope(); });

    // Mobile
    nopeBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      moveNope();
    }, { passive:false });

    window.addEventListener("load", () => {
      setDays(selectedDays);
      moveNope();
    });

    window.addEventListener("resize", moveNope);
  </script>
</body>
</html>
